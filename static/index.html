<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Sentiment Check</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stage">
    <div class="marquee">
      <div class="bulbs">
        <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
        <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
        <div class="bulb"></div>
      </div>
      <h1>Now Showing: Sentiment</h1>
      <p class="subtitle">Paste a movie review, get the verdict.</p>
    </div>

    <div class="panel">
      <label for="reviewInput">Your Review</label>
      <textarea id="reviewInput" placeholder="e.g. This film had me on the edge of my seat from start to finish..."></textarea>
      <button id="checkBtn" onclick="checkSentiment()">Check Sentiment</button>

      <div id="error"></div>

      <div id="result">
        <div class="verdict" id="verdictBox">
          <div class="verdict-icon" id="verdictIcon">🎬</div>
          <div class="verdict-text" style="flex:1">
            <div class="label">Verdict</div>
            <div class="value" id="verdictValue">—</div>
            <div class="confidence-bar"><div class="confidence-fill" id="confidenceFill" style="width:0%"></div></div>
            <div class="confidence-label" id="confidenceLabel"></div>
          </div>
        </div>
      </div>
    </div>

    <p class="footer-tag">Powered by TF-IDF + Logistic Regression · FastAPI backend</p>
  </div>

<script src="script.js"></script>
</body>
</html>
