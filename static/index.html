<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Sentiment Check</title>
<style>
  :root{
    --bg:#141119;
    --panel:#1e1a26;
    --border:#332c3f;
    --text:#f0ecf5;
    --muted:#9187a3;
    --marquee:#f2c744;
    --pos:#5fd68a;
    --neg:#e8607a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 20% 10%, rgba(242,199,68,.06), transparent 40%),
      var(--bg);
    color:var(--text);
    font-family:'Georgia',serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 16px;
  }
  .stage{
    width:100%;
    max-width:560px;
  }
  .marquee{
    text-align:center;
    margin-bottom:6px;
  }
  .marquee .bulbs{
    display:flex;
    justify-content:center;
    gap:6px;
    margin-bottom:14px;
  }
  .bulb{
    width:6px;height:6px;border-radius:50%;
    background:var(--marquee);
    box-shadow:0 0 6px var(--marquee);
  }
  h1{
    font-size:26px;
    text-align:center;
    margin:0 0 4px;
    letter-spacing:.02em;
    color:var(--marquee);
    font-weight:400;
  }
  .subtitle{
    text-align:center;
    color:var(--muted);
    font-size:13px;
    font-family:system-ui,sans-serif;
    margin:0 0 28px;
    font-style:italic;
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:4px;
    padding:24px;
    position:relative;
  }
  .panel::before, .panel::after{
    content:"";
    position:absolute;
    top:0; bottom:0;
    width:14px;
    background-image:repeating-linear-gradient(to bottom, var(--bg) 0 8px, var(--border) 8px 10px);
  }
  .panel::before{left:-14px;}
  .panel::after{right:-14px;}

  label{
    display:block;
    font-family:system-ui,sans-serif;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:.1em;
    color:var(--muted);
    margin-bottom:8px;
  }
  textarea{
    width:100%;
    min-height:120px;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:4px;
    color:var(--text);
    font-family:system-ui,sans-serif;
    font-size:14.5px;
    line-height:1.5;
    padding:12px 14px;
    resize:vertical;
  }
  textarea:focus{
    outline:none;
    border-color:var(--marquee);
  }
  button{
    width:100%;
    margin-top:16px;
    padding:13px;
    background:var(--marquee);
    color:#221c0a;
    border:none;
    border-radius:4px;
    font-family:system-ui,sans-serif;
    font-weight:700;
    font-size:14px;
    letter-spacing:.03em;
    text-transform:uppercase;
    cursor:pointer;
    transition:filter .15s;
  }
  button:hover{filter:brightness(1.08);}
  button:disabled{opacity:.5;cursor:not-allowed;}

  #result{
    margin-top:22px;
    display:none;
  }
  .verdict{
    display:flex;
    align-items:center;
    gap:12px;
    padding:16px 18px;
    border-radius:4px;
    font-family:system-ui,sans-serif;
  }
  .verdict.positive{background:rgba(95,214,138,.12);border:1px solid rgba(95,214,138,.4);}
  .verdict.negative{background:rgba(232,96,122,.12);border:1px solid rgba(232,96,122,.4);}
  .verdict-icon{font-size:26px;}
  .verdict-text .label{
    font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);
  }
  .verdict-text .value{
    font-size:19px;font-weight:700;margin-top:2px;
  }
  .positive .value{color:var(--pos);}
  .negative .value{color:var(--neg);}
  .confidence-bar{
    margin-top:10px;
    height:5px;
    background:var(--bg);
    border-radius:3px;
    overflow:hidden;
  }
  .confidence-fill{
    height:100%;
    transition:width .4s ease;
  }
  .positive .confidence-fill{background:var(--pos);}
  .negative .confidence-fill{background:var(--neg);}
  .confidence-label{
    font-family:system-ui,sans-serif;
    font-size:11.5px;
    color:var(--muted);
    margin-top:6px;
  }

  #error{
    margin-top:16px;
    padding:12px 14px;
    background:rgba(232,96,122,.1);
    border:1px solid rgba(232,96,122,.35);
    border-radius:4px;
    color:var(--neg);
    font-family:system-ui,sans-serif;
    font-size:13px;
    display:none;
  }

  .footer-tag{
    text-align:center;
    margin-top:20px;
    font-family:system-ui,sans-serif;
    font-size:11.5px;
    color:var(--muted);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="marquee">
      <div class="bulbs">
        <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
        <div class="bulb"></div><div class="bulb"></div><div class="bulb"></div>
        <div class="bulb"></div>
      </div>
      <h1>Now Showing: Sentiment</h1>
      <p class="subtitle">Paste a movie review, get the verdict.</p>
    </div>

    <div class="panel">
      <label for="reviewInput">Your Review</label>
      <textarea id="reviewInput" placeholder="e.g. This film had me on the edge of my seat from start to finish..."></textarea>
      <button id="checkBtn" onclick="checkSentiment()">Check Sentiment</button>

      <div id="error"></div>

      <div id="result">
        <div class="verdict" id="verdictBox">
          <div class="verdict-icon" id="verdictIcon">🎬</div>
          <div class="verdict-text" style="flex:1">
            <div class="label">Verdict</div>
            <div class="value" id="verdictValue">—</div>
            <div class="confidence-bar"><div class="confidence-fill" id="confidenceFill" style="width:0%"></div></div>
            <div class="confidence-label" id="confidenceLabel"></div>
          </div>
        </div>
      </div>
    </div>

    <p class="footer-tag">Powered by TF-IDF + Logistic Regression · FastAPI backend</p>
  </div>

<script>
  const API_URL = "http://127.0.0.1:8000/predict"; // change this to your deployed API URL

  async function checkSentiment(){
    const text = document.getElementById("reviewInput").value.trim();
    const btn = document.getElementById("checkBtn");
    const resultBox = document.getElementById("result");
    const errorBox = document.getElementById("error");

    errorBox.style.display = "none";
    resultBox.style.display = "none";

    if(!text){
      errorBox.textContent = "Please write a review first.";
      errorBox.style.display = "block";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Checking...";

    try{
      const res = await fetch(API_URL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text})
      });

      if(!res.ok){
        const err = await res.json();
        throw new Error(err.detail || "Something went wrong.");
      }

      const data = await res.json();
      const isPositive = data.sentiment === "positive";
      const verdictBox = document.getElementById("verdictBox");

      verdictBox.className = "verdict " + (isPositive ? "positive" : "negative");
      document.getElementById("verdictIcon").textContent = isPositive ? "🍿" : "🎭";
      document.getElementById("verdictValue").textContent = isPositive ? "Positive" : "Negative";
      document.getElementById("confidenceFill").style.width = (data.confidence * 100) + "%";
      document.getElementById("confidenceLabel").textContent = `Confidence: ${(data.confidence*100).toFixed(1)}%`;

      resultBox.style.display = "block";
    }catch(e){
      errorBox.textContent = e.message.includes("fetch") ? "Could not reach the API — is it running?" : e.message;
      errorBox.style.display = "block";
    }finally{
      btn.disabled = false;
      btn.textContent = "Check Sentiment";
    }
  }
</script>
</body>
</html>
